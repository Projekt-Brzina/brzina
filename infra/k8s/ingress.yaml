apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brzina-ingress
  namespace: brzina
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: brzina.local
      http:
        paths:
          - path: /api/?(.*)
            pathType: Prefix
            backend:
              service:
                name: api-api
                port:
                  number: 8000
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-frontend
                port:
                  number: 80