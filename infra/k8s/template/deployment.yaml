apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-service
  namespace: carshare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: template-service
  template:
    metadata:
      labels:
        app: template-service
    spec:
      containers:
        - name: template-service
          image: carshare-template-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: template-service
            - name: DATABASE_URL
              value: postgres://carshare_user:changeme@postgres.carshare.svc.cluster.local:5432/carshare
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000