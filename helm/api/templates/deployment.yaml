apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    app: {{ include "api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "api.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "api.name" . }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: {{ .Values.env.DATABASE_URL | quote }}
            - name: AUTH_SERVICE_URL
              value: {{ .Values.env.AUTH_SERVICE_URL | quote }}
            - name: CAR_SERVICE_URL
              value: {{ .Values.env.CAR_SERVICE_URL | quote }}
            - name: BOOKING_SERVICE_URL
              value: {{ .Values.env.BOOKING_SERVICE_URL | quote }}
            - name: PAYMENT_SERVICE_URL
              value: {{ .Values.env.PAYMENT_SERVICE_URL | quote }}
