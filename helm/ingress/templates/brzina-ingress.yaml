# Ingress for frontend static assets (no rewrite)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brzina-frontend-assets-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: brzina.local
      http:
        paths:
          - path: /(.*\.(js|css|png|jpg|ico|svg|woff2?))$
            pathType: ImplementationSpecific
            backend:
              service:
                name: brzina-frontend
                port:
                  number: 80
# Ingress for frontend SPA fallback (rewrite to /index.html)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brzina-frontend-spa-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /index.html
spec:
  ingressClassName: nginx
  rules:
    - host: brzina.local
      http:
        paths:
          - path: /.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: brzina-frontend
                port:
                  number: 80
