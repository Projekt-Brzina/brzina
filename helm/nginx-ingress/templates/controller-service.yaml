apiVersion: v1
kind: Service
metadata:
  name: {{ include "nginx-ingress.fullname" . }}-controller
  labels:
    app.kubernetes.io/name: {{ include "nginx-ingress.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.controller.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "nginx-ingress.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: https
