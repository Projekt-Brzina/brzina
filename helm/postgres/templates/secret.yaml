apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
    chart: postgres
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
data:
  postgres-password: {{ .Values.postgresPassword | default "Y2hhbmdlbWU=" }}
# Default is 'changeme' base64-encoded. Override with --set postgresPassword=$(echo -n 'yourpassword' | base64)
